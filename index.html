<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>withNiiLante Overlay Editor</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0c1118; font-family: sans-serif; color: white; }
        #root { min-height: 100vh; }
        input[type="checkbox"] { accent-color: #C8952A; transform: scale(1.2); cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ── CONFIG ─────────────────────────────────────────────────────────────
        const VIDEOS = [
            { id:"d1p1", label:"D1P1", sub:"Ghana NLP Research  ·  arXiv 2021",          caption:"I Was In the Lab While Everyone Talked About AI" },
            { id:"d1p2", label:"D1P2", sub:"Machine Translation Research  ·  arXiv 2021", caption:"Why Your Twi Ads Are Costing You Customers" },
            { id:"d2p1", label:"D2P1", sub:"NASA Space Apps 2018  ·  Global Nominee",     caption:"Ghana Had Engineers Building for NASA" },
            { id:"d2p2", label:"D2P2", sub:"African Hackathon 2021  ·  1st Runner-Up",    caption:"We Used AI to Help Ghanaian Farmers. Africa Noticed." },
            { id:"d3p1", label:"D3P1", sub:"Cybersecurity Alert  ·  CVE-2026-33017",      caption:"Most People Building AI Agents Have No Idea Their Tool Has a Backdoor" },
            { id:"d3p2", label:"D3P2", sub:"IoT Security  ·  March 2026",                 caption:"3 Million Devices Attacked. The Checklist I Printed." },
            { id:"d4p1", label:"D4P1", sub:"AI Skills 2026  ·  NVIDIA GTC",               caption:"Most People Use AI Like a Calculator. Winners Use It Like a Staff Member." },
            { id:"d4p2", label:"D4P2", sub:"Save This  ·  AI Builder Skills",             caption:"5 AI Skills That Will Make You Untouchable in 2026" },
            { id:"d5p1", label:"D5P1", sub:"AI Commerce 2026  ·  Shopify Agentic",        caption:"You Can Now Shop Inside ChatGPT. Most Businesses In Ghana Don't Know This." },
            { id:"d5p2", label:"D5P2", sub:"Typeres.com  ·  On-Demand Printing Ghana",    caption:"Behind the Scenes: A 200-Unit Brand Order at Typeres" },
            { id:"d6p1", label:"D6P1", sub:"WhatsApp Scam Alert  ·  MoMo Safety Ghana",  caption:"Most People Who Lose Their WhatsApp Didn't Know This Message Was Fake" },
            { id:"d6p2", label:"D6P2", sub:"TikTok Security  ·  Active Phishing Campaign",caption:"TikTok Business Accounts Are Being Actively Targeted. Including Mine." },
            { id:"d7p1", label:"D7P1", sub:"withNiiLante  ·  Week in Review",             caption:"From NASA to Kumasi. My Week in 60 Seconds." },
            { id:"d7p2", label:"D7P2", sub:"Community  ·  No Script Tonight",             caption:"Real Talk. What's the One AI Development That Genuinely Worries You?" },
        ];

        const ALL_PLATFORMS = [
            { key:"instagram", label:"Instagram", glyph: "\ue055" },
            { key:"x-twitter", label:"X / Twitter", glyph: "\ue61b" },
            { key:"snapchat",  label:"Snapchat",  glyph: "\uf2ac" },
            { key:"tiktok",    label:"TikTok",    glyph: "\ue07b" },
            { key:"youtube",   label:"YouTube",   glyph: "\uf167" },
            { key:"linkedin",  label:"LinkedIn",  glyph: "\uf08c" },
        ];

        const W = 1080, H = 1920, PAD = 60;

        // ── UTILS ──────────────────────────────────────────────────────────────
        const rrect = (ctx, x, y, w, h, r) => {
            ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y, x+w,y+r, r);
            ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
            ctx.lineTo(x+r, y+h); ctx.arcTo(x,y+h, x,y+h-r, r);
            ctx.lineTo(x, y+r); ctx.arcTo(x,y, x+r,y, r); ctx.closePath();
        };

        const wrapText = (ctx, text, maxW) => {
            const out = [];
            text.split("\n").forEach(line => {
                let cur = "";
                line.split(" ").forEach(w => {
                    let test = cur ? cur+" "+w : w;
                    if (ctx.measureText(test).width > maxW) { out.push(cur); cur = w; }
                    else cur = test;
                });
                if (cur) out.push(cur);
            });
            return out;
        };

        // ── APP ────────────────────────────────────────────────────────────────
        function App() {
            const canvasRef = useRef(null);
            const [selected, setSelected] = useState(0);
            
            // Drag State
            const [dragging, setDragging] = useState(null);
            const offsetRef = useRef({ x: 0, y: 0 });

            const [state, setState] = useState({
                topLabel: VIDEOS[0].sub,
                mainCaption: VIDEOS[0].caption,
                handle: "@withNiiLante",
                accent: "#C8952A",
                topOpacity: 0.8,
                botOpacity: 0.9,
                activePlatforms: { instagram: true, "x-twitter": true, tiktok: true, youtube: true },
                // Toggles
                showTop: true,
                showCaption: true,
                showBottom: true,
                // Positions
                posTop: { x: PAD, y: 50 },
                posCaption: { x: 0, y: 800 },
                posBottom: { x: PAD, y: 1650 }
            });

            useEffect(() => {
                const style = document.createElement("style");
                style.textContent = `@font-face { font-family: "Font Awesome 6 Brands"; src: url("https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/webfonts/fa-brands-400.woff2") format("woff2"); }`;
                document.head.appendChild(style);
            }, []);

            // Master Render Function
            const draw = useCallback((canvas, isTransparent) => {
                const ctx = canvas.getContext("2d");
                ctx.clearRect(0, 0, W, H);
                
                if (!isTransparent) { 
                    ctx.fillStyle = "#0c1118"; 
                    ctx.fillRect(0, 0, W, H); 
                }

                const { topLabel, mainCaption, handle, accent, topOpacity, botOpacity, activePlatforms, showTop, showCaption, showBottom, posTop, posCaption, posBottom } = state;

                // 1. Top gradient & Pill
                if (showTop) {
                    const tg = ctx.createLinearGradient(0, 0, 0, H * 0.26);
                    tg.addColorStop(0, `rgba(0,0,0,${topOpacity})`); tg.addColorStop(1, "rgba(0,0,0,0)");
                    ctx.fillStyle = tg; ctx.fillRect(0, 0, W, H * 0.26);

                    const al = ctx.createLinearGradient(PAD, 0, W-PAD, 0);
                    al.addColorStop(0, "transparent"); al.addColorStop(0.5, accent); al.addColorStop(1, "transparent");
                    ctx.fillStyle = al; ctx.fillRect(PAD, 0, W-PAD*2, 3);

                    if (topLabel.trim()) {
                        ctx.font = "400 26px monospace";
                        const tw = ctx.measureText(topLabel).width;
                        ctx.fillStyle = "rgba(17,17,17,0.9)";
                        rrect(ctx, posTop.x, posTop.y, tw + 60, 50, 25); ctx.fill();
                        ctx.fillStyle = accent; ctx.beginPath(); ctx.arc(posTop.x + 20, posTop.y + 25, 6, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = "#FFF"; ctx.fillText(topLabel, posTop.x + 36, posTop.y + 34);
                    }
                }

                // 2. Caption Strip
                if (showCaption) {
                    ctx.font = "bold 46px sans-serif";
                    const lines = wrapText(ctx, mainCaption.toUpperCase(), W - PAD*2 - 40);
                    const stripH = (lines.length * 56) + 70;
                    
                    ctx.fillStyle = "rgba(0,0,0,0.88)"; ctx.fillRect(posCaption.x, posCaption.y, W, stripH);
                    ctx.fillStyle = accent; 
                    ctx.fillRect(posCaption.x, posCaption.y, W, 3); 
                    ctx.fillRect(posCaption.x, posCaption.y + stripH - 3, W, 3);
                    
                    ctx.fillStyle = "#FFF";
                    lines.forEach((l, i) => ctx.fillText(l, posCaption.x + PAD + 20, posCaption.y + 65 + (i * 56)));
                }

                // 3. Bottom bar
                if (showBottom) {
                    const bg = ctx.createLinearGradient(0, H*0.76, 0, H);
                    bg.addColorStop(0, "rgba(0,0,0,0)"); bg.addColorStop(1, `rgba(0,0,0,${botOpacity})`);
                    ctx.fillStyle = bg; ctx.fillRect(0, H*0.76, W, H*0.24);

                    let curX = posBottom.x;
                    ctx.font = '44px "Font Awesome 6 Brands"';
                    ALL_PLATFORMS.forEach(p => {
                        if (activePlatforms[p.key]) {
                            ctx.fillStyle = "#FFF";
                            ctx.fillText(p.glyph, curX, posBottom.y);
                            curX += 70;
                        }
                    });
                    ctx.font = "400 34px monospace";
                    ctx.fillText(handle, curX + 10, posBottom.y);
                }
            }, [state]);

            // Keep live preview updated
            useEffect(() => {
                if (canvasRef.current) draw(canvasRef.current, false);
            }, [draw]);

            const download = (trans) => {
                const c = document.createElement("canvas");
                c.width = W; c.height = H;
                draw(c, trans);
                const a = document.createElement("a");
                a.download = `overlay-${trans ? 'capcut' : 'preview'}.png`;
                a.href = c.toDataURL();
                a.click();
            };

            const update = (key, val) => setState(s => ({ ...s, [key]: val }));

            // ── DRAG & DROP LOGIC ──────────────────────────────────────────
            const getCanvasCoords = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const scaleX = W / rect.width;
                const scaleY = H / rect.height;
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY
                };
            };

            const handleMouseDown = (e) => {
                const { x, y } = getCanvasCoords(e);
                
                // Approximate hitboxes on 1080x1920 scale
                if (state.showTop && y >= state.posTop.y && y <= state.posTop.y + 60) {
                    setDragging('top');
                    offsetRef.current = { x: x - state.posTop.x, y: y - state.posTop.y };
                    return;
                }
                
                if (state.showCaption && y >= state.posCaption.y && y <= state.posCaption.y + 250) {
                    setDragging('caption');
                    offsetRef.current = { x: x - state.posCaption.x, y: y - state.posCaption.y };
                    return;
                }

                if (state.showBottom && y >= state.posBottom.y - 50 && y <= state.posBottom.y + 50) {
                    setDragging('bottom');
                    offsetRef.current = { x: x - state.posBottom.x, y: y - state.posBottom.y };
                    return;
                }
            };

            const handleMouseMove = (e) => {
                if (!dragging) return;
                const { x, y } = getCanvasCoords(e);
                
                if (dragging === 'top') {
                    update('posTop', { x: x - offsetRef.current.x, y: y - offsetRef.current.y });
                } else if (dragging === 'caption') {
                    update('posCaption', { x: x - offsetRef.current.x, y: y - offsetRef.current.y });
                } else if (dragging === 'bottom') {
                    update('posBottom', { x: x - offsetRef.current.x, y: y - offsetRef.current.y });
                }
            };

            const handleMouseUp = () => setDragging(null);

            return (
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '30px', padding: '40px', justifyContent: 'center' }}>
                    
                    {/* LEFT: Live Preview Canvas */}
                    <div style={{ textAlign: 'center' }}>
                        <h3 style={{ color: '#C8952A', marginBottom: 15 }}>Live Interactive Preview</h3>
                        <div style={{ border: '3px solid #333', borderRadius: '10px', overflow: 'hidden', cursor: dragging ? 'grabbing' : 'grab' }}>
                            <canvas 
                                ref={canvasRef} 
                                width={W} 
                                height={H} 
                                style={{ width: '320px', height: '569px', display: 'block' }}
                                onMouseDown={handleMouseDown}
                                onMouseMove={handleMouseMove}
                                onMouseUp={handleMouseUp}
                                onMouseLeave={handleMouseUp}
                            />
                        </div>
                        <p style={{ fontSize: '12px', opacity: 0.6, marginTop: 10 }}>🖱️ Click and drag elements directly on the canvas!</p>
                    </div>

                    {/* RIGHT: Control Panel */}
                    <div style={{ maxWidth: '500px', flex: '1 1 400px', background: '#111827', padding: '25px', borderRadius: '15px' }}>
                        <h2 style={{ color: '#C8952A', marginTop: 0 }}>withNiiLante Controls</h2>
                        
                        {/* Preset Buttons */}
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, margin: '15px 0' }}>
                            {VIDEOS.map((v, i) => (
                                <button key={v.id} onClick={() => { setSelected(i); setState(s => ({ ...s, topLabel: v.sub, mainCaption: v.caption })); }}
                                    style={{ padding: '6px 10px', background: selected === i ? '#C8952A' : '#1a1a1a', border: 'none', color: 'white', cursor: 'pointer', borderRadius: 4, fontSize: 11 }}>
                                    {v.label}
                                </button>
                            ))}
                        </div>

                        {/* Visibility Toggles */}
                        <div style={{ background: '#050505', padding: '15px', borderRadius: '8px', marginBottom: '20px', display: 'flex', justifyContent: 'space-around' }}>
                            <label style={{ cursor: 'pointer' }}><input type="checkbox" checked={state.showTop} onChange={e => update('showTop', e.target.checked)} /> Top Pill</label>
                            <label style={{ cursor: 'pointer' }}><input type="checkbox" checked={state.showCaption} onChange={e => update('showCaption', e.target.checked)} /> Caption</label>
                            <label style={{ cursor: 'pointer' }}><input type="checkbox" checked={state.showBottom} onChange={e => update('showBottom', e.target.checked)} /> Footer</label>
                        </div>

                        {/* Content Inputs */}
                        <label style={{ opacity: 0.6, fontSize: 12 }}>TOP LABEL</label>
                        <input style={{ width: '100%', padding: 12, margin: '6px 0 15px', background: '#050505', border: '1px solid #333', color: 'white', borderRadius: 8, boxSizing: 'border-box' }} 
                            value={state.topLabel} onChange={e => update('topLabel', e.target.value)} />

                        <label style={{ opacity: 0.6, fontSize: 12 }}>MAIN CAPTION</label>
                        <textarea style={{ width: '100%', height: 70, padding: 12, margin: '6px 0 15px', background: '#050505', border: '1px solid #333', color: 'white', borderRadius: 8, boxSizing: 'border-box' }} 
                            value={state.mainCaption} onChange={e => update('mainCaption', e.target.value)} />

                        {/* Export Buttons */}
                        <div style={{ display: 'flex', gap: 15, marginTop: '10px' }}>
                            <button onClick={() => download(false)} style={{ flex: 1, padding: 12, background: '#333', border: 'none', color: 'white', borderRadius: 8, cursor: 'pointer' }}>Preview PNG</button>
                            <button onClick={() => download(true)} style={{ flex: 1, padding: 12, background: '#C8952A', border: 'none', color: 'white', borderRadius: 8, cursor: 'pointer', fontWeight: 'bold' }}>Download for CapCut</button>
                        </div>
                        <p style={{ fontSize: 11, opacity: 0.4, marginTop: 15 }}>Tip: "Download for CapCut" creates a transparent graphic. Set Blend Mode to 'Screen' in CapCut.</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
