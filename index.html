<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>withNiiLante Overlay Editor</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #07111a; font-family: sans-serif; color: white; }
        #root { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        input, textarea, button { font-family: inherit; }
        
        /* Layout */
        .editor-container { 
            display: flex; 
            flex-direction: row; 
            gap: 40px; 
            max-width: 1200px; 
            width: 100%; 
            justify-content: center;
            align-items: flex-start;
        }
        
        @media (max-width: 900px) {
            .editor-container { flex-direction: column; align-items: center; }
        }

        /* Preview Styling */
        .preview-pane {
            width: 320px; /* Scaled down from 1080 */
            height: 568px; /* Scaled down from 1920 */
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 8px solid #1f2937;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: sticky;
            top: 20px;
        }
        canvas { width: 100%; height: 100%; display: block; }

        /* Form Styling */
        .editor-pane { flex: 1; max-width: 600px; background: #111827; padding: 30px; borderRadius: 15px; border: 1px solid #1f2937; }
        .control-group { margin-bottom: 20px; }
        label { opacity: 0.6; font-size: 11px; font-weight: bold; letter-spacing: 1px; display: block; margin-bottom: 8px; text-transform: uppercase; }
        
        .platform-btn, .align-btn {
            padding: 8px 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            font-size: 11px;
            transition: 0.2s;
        }
        .platform-btn.active, .align-btn.active {
            background: #C8952A;
            border-color: #C8952A;
            color: #000;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const VIDEOS = [
            { id:"d1p1", label:"D1P1", sub:"Ghana NLP Research  ·  arXiv 2021",          caption:"I Was In the Lab While Everyone Talked About AI" },
            { id:"d1p2", label:"D1P2", sub:"Machine Translation Research  ·  arXiv 2021", caption:"Why Your Twi Ads Are Costing You Customers" },
            { id:"d2p1", label:"D2P1", sub:"NASA Space Apps 2018  ·  Global Nominee",     caption:"Ghana Had Engineers Building for NASA" },
            { id:"d2p2", label:"D2P2", sub:"African Hackathon 2021  ·  1st Runner-Up",    caption:"We Used AI to Help Ghanaian Farmers. Africa Noticed." },
            { id:"d3p1", label:"D3P1", sub:"Cybersecurity Alert  ·  CVE-2026-33017",      caption:"Most People Building AI Agents Have No Idea Their Tool Has a Backdoor" },
            { id:"d4p1", label:"D4P1", sub:"AI Skills 2026  ·  NVIDIA GTC",               caption:"Most People Use AI Like a Calculator. Winners Use It Like a Staff Member." },
            { id:"d7p1", label:"D7P1", sub:"withNiiLante  ·  Week in Review",             caption:"From NASA to Kumasi. My Week in 60 Seconds." },
        ];

        const ALL_PLATFORMS = [
            { key:"instagram", label:"Instagram", glyph: "\ue055" },
            { key:"x-twitter", label:"X",         glyph: "\ue61b" },
            { key:"tiktok",    label:"TikTok",    glyph: "\ue07b" },
            { key:"youtube",   label:"YouTube",   glyph: "\uf167" },
            { key:"linkedin",  label:"LinkedIn",  glyph: "\uf08c" },
            { key:"whatsapp",  label:"WhatsApp",  glyph: "\uf232" },
        ];

        const W = 1080, H = 1920, PAD = 60;

        const rrect = (ctx, x, y, w, h, r) => {
            ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y, x+w,y+r, r);
            ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
            ctx.lineTo(x+r, y+h); ctx.arcTo(x,y+h, x,y+h-r, r);
            ctx.lineTo(x, y+r); ctx.arcTo(x,y, x+r,y, r); ctx.closePath();
        };

        const wrapText = (ctx, text, maxW) => {
            const out = [];
            text.split("\n").forEach(line => {
                let cur = "";
                line.split(" ").forEach(w => {
                    let test = cur ? cur+" "+w : w;
                    if (ctx.measureText(test).width > maxW) { out.push(cur); cur = w; }
                    else cur = test;
                });
                if (cur) out.push(cur);
            });
            return out;
        };

        const renderOverlay = (canvas, state, transparent) => {
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, W, H);
            
            // Background for Preview (Dark Blue) vs Transparent for CapCut
            if (!transparent) { 
                ctx.fillStyle = "#0c1118"; 
                ctx.fillRect(0, 0, W, H); 
                // Simple placeholder for "video" background in preview
                ctx.fillStyle = "rgba(255,255,255,0.03)";
                ctx.fillRect(0, H*0.2, W, H*0.6);
            }

            const { topLabel, mainCaption, handle, accent, topOpacity, botOpacity, activePlatforms, topAlign } = state;

            // Top gradient
            const tg = ctx.createLinearGradient(0, 0, 0, H * 0.26);
            tg.addColorStop(0, `rgba(0,0,0,${topOpacity})`); tg.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = tg; ctx.fillRect(0, 0, W, H * 0.26);

            // Accent Line
            const al = ctx.createLinearGradient(PAD, 0, W-PAD, 0);
            al.addColorStop(0, "transparent"); al.addColorStop(0.5, accent); al.addColorStop(1, "transparent");
            ctx.fillStyle = al; ctx.fillRect(PAD, 0, W-PAD*2, 3);

            // Pill with Alignment Logic
            if (topLabel.trim()) {
                ctx.font = "400 26px monospace";
                const tw = ctx.measureText(topLabel).width;
                const pillW = tw + 60;
                let pillX = PAD; 

                if (topAlign === 'center') pillX = (W / 2) - (pillW / 2);
                if (topAlign === 'right') pillX = W - PAD - pillW;

                ctx.fillStyle = "rgba(17,17,17,0.9)";
                rrect(ctx, pillX, 50, pillW, 50, 25); ctx.fill();
                ctx.fillStyle = accent; ctx.beginPath(); ctx.arc(pillX + 20, 75, 6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#FFF"; ctx.fillText(topLabel, pillX + 36, 84);
            }

            // Caption Strip
            ctx.font = "bold 46px sans-serif";
            const lines = wrapText(ctx, mainCaption.toUpperCase(), W - PAD*2 - 40);
            const stripH = (lines.length * 56) + 70;
            const stripY = (H/2) - (stripH/2);
            ctx.fillStyle = "rgba(0,0,0,0.88)"; ctx.fillRect(0, stripY, W, stripH);
            ctx.fillStyle = accent; ctx.fillRect(0, stripY, W, 3); ctx.fillRect(0, stripY + stripH - 3, W, 3);
            ctx.fillStyle = "#FFF";
            lines.forEach((l, i) => ctx.fillText(l, PAD + 20, stripY + 65 + (i * 56)));

            // Bottom bar
            const bg = ctx.createLinearGradient(0, H*0.76, 0, H);
            bg.addColorStop(0, "rgba(0,0,0,0)"); bg.addColorStop(1, `rgba(0,0,0,${botOpacity})`);
            ctx.fillStyle = bg; ctx.fillRect(0, H*0.76, W, H*0.24);

            const divY = H * 0.878;
            let curX = PAD;
            ctx.font = '44px "Font Awesome 6 Brands"';
            ALL_PLATFORMS.forEach(p => {
                if (activePlatforms[p.key]) {
                    ctx.fillStyle = "#FFF";
                    ctx.fillText(p.glyph, curX, divY + 75);
                    curX += 70;
                }
            });
            ctx.font = "400 34px monospace";
            ctx.fillText(handle, curX + 10, divY + 75);
        };

        function App() {
            const canvasRef = useRef(null);
            const [selected, setSelected] = useState(0);
            const [state, setState] = useState({
                topLabel: VIDEOS[0].sub,
                mainCaption: VIDEOS[0].caption,
                handle: "@withNiiLante",
                accent: "#C8952A",
                topOpacity: 0.8,
                botOpacity: 0.9,
                topAlign: 'left',
                activePlatforms: { instagram: true, tiktok: true, youtube: true, "x-twitter": true }
            });

            // Live Update Trigger
            useEffect(() => {
                renderOverlay(canvasRef.current, state, false);
            }, [state]);

            useEffect(() => {
                const style = document.createElement("style");
                style.textContent = `@font-face { font-family: "Font Awesome 6 Brands"; src: url("https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/webfonts/fa-brands-400.woff2") format("woff2"); }`;
                document.head.appendChild(style);
            }, []);

            const download = (trans) => {
                const c = document.createElement("canvas");
                c.width = W; c.height = H;
                renderOverlay(c, state, trans);
                const a = document.createElement("a");
                a.download = `overlay-${trans ? 'capcut' : 'preview'}.png`;
                a.href = c.toDataURL();
                a.click();
            };

            const update = (key, val) => setState(s => ({ ...s, [key]: val }));

            return (
                <React.Fragment>
                    <h1 style={{ color: '#C8952A', marginBottom: '30px' }}>withNiiLante Overlay Editor</h1>
                    
                    <div className="editor-container">
                        {/* Live Preview Pane */}
                        <div className="preview-pane">
                            <canvas ref={canvasRef} width={W} height={H} />
                        </div>

                        {/* Controls Pane */}
                        <div className="editor-pane">
                            <div className="control-group">
                                <label>Presets</label>
                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                                    {VIDEOS.map((v, i) => (
                                        <button key={v.id} onClick={() => { setSelected(i); setState(s => ({ ...s, topLabel: v.sub, mainCaption: v.caption })); }}
                                            style={{ padding: '6px 10px', background: selected === i ? '#C8952A' : '#1a1a1a', border: 'none', color: selected === i ? '#000' : 'white', cursor: 'pointer', borderRadius: 4, fontSize: '10px' }}>
                                            {v.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="control-group">
                                <label>Top Label Alignment</label>
                                <div style={{ display: 'flex', gap: 8 }}>
                                    {['left', 'center', 'right'].map(pos => (
                                        <button key={pos} className={`align-btn ${state.topAlign === pos ? 'active' : ''}`} onClick={() => update('topAlign', pos)}>
                                            {pos.toUpperCase()}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="control-group">
                                <label>Top Label Text</label>
                                <input style={{ width: '100%', boxSizing: 'border-box', padding: '12px', background: '#050505', border: '1px solid #333', color: 'white', borderRadius: 8 }} 
                                    value={state.topLabel} onChange={e => update('topLabel', e.target.value)} />
                            </div>

                            <div className="control-group">
                                <label>Main Caption</label>
                                <textarea style={{ width: '100%', boxSizing: 'border-box', height: 80, padding: '12px', background: '#050505', border: '1px solid #333', color: 'white', borderRadius: 8, resize: 'none' }} 
                                    value={state.mainCaption} onChange={e => update('mainCaption', e.target.value)} />
                            </div>

                            <div className="control-group">
                                <label>Social Platforms</label>
                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                                    {ALL_PLATFORMS.map(p => (
                                        <button key={p.key} className={`platform-btn ${state.activePlatforms[p.key] ? 'active' : ''}`} onClick={() => update('activePlatforms', {...state.activePlatforms, [p.key]: !state.activePlatforms[p.key]})}>
                                            {p.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div style={{ display: 'flex', gap: 15, marginTop: 30 }}>
                                <button onClick={() => download(false)} style={{ flex: 1, padding: 15, background: '#1f2937', border: 'none', color: 'white', borderRadius: 8, cursor: 'pointer' }}>Download Preview</button>
                                <button onClick={() => download(true)} style={{ flex: 1, padding: 15, background: '#C8952A', border: 'none', color: '#000', borderRadius: 8, cursor: 'pointer', fontWeight: 'bold' }}>Download for CapCut</button>
                            </div>
                        </div>
                    </div>
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
